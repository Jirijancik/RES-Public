<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Czech Data Sources Catalog — RES Platform</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #242736;
    --surface3: #2e3145;
    --border: #363a4e;
    --text: #e2e4ed;
    --text-muted: #8b8fa3;
    --text-dim: #5d6177;
    --green: #22c55e;
    --green-bg: rgba(34, 197, 94, 0.08);
    --green-border: rgba(34, 197, 94, 0.25);
    --red: #ef4444;
    --red-bg: rgba(239, 68, 68, 0.08);
    --red-border: rgba(239, 68, 68, 0.25);
    --amber: #f59e0b;
    --amber-bg: rgba(245, 158, 11, 0.08);
    --amber-border: rgba(245, 158, 11, 0.25);
    --blue: #3b82f6;
    --blue-bg: rgba(59, 130, 246, 0.08);
    --blue-border: rgba(59, 130, 246, 0.25);
    --purple: #a855f7;
    --purple-bg: rgba(168, 85, 247, 0.08);
    --purple-border: rgba(168, 85, 247, 0.25);
    --cyan: #06b6d4;
    --cyan-bg: rgba(6, 182, 212, 0.08);
    --cyan-border: rgba(6, 182, 212, 0.25);
    --orange: #f97316;
    --orange-bg: rgba(249, 115, 22, 0.08);
    --orange-border: rgba(249, 115, 22, 0.25);
    --teal: #14b8a6;
    --teal-bg: rgba(20, 184, 166, 0.08);
    --teal-border: rgba(20, 184, 166, 0.25);
    --pink: #ec4899;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg); color: var(--text); line-height: 1.6; min-height: 100vh;
  }
  .header {
    padding: 32px 48px 24px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, rgba(59,130,246,0.03) 0%, transparent 100%);
  }
  .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
  .header h1 { font-size: 28px; font-weight: 700; letter-spacing: -0.5px; color: var(--blue); }
  .header .sub { color: var(--text-muted); font-size: 14px; }
  .hbadge { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 8px 16px; font-size: 12px; color: var(--text-muted); font-family: 'SF Mono', monospace; }
  .nav { display: flex; gap: 4px; padding: 16px 48px 0; border-bottom: 1px solid var(--border); background: var(--bg); position: sticky; top: 0; z-index: 100; }
  .nav-tab { padding: 10px 20px; font-size: 13px; font-weight: 500; color: var(--text-muted); background: transparent; border: none; cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.2s; position: relative; top: 1px; font-family: inherit; }
  .nav-tab:hover { color: var(--text); }
  .nav-tab.active { color: var(--text); border-bottom-color: var(--blue); }
  .tc { display: inline-block; background: var(--surface3); border-radius: 10px; padding: 1px 7px; font-size: 11px; margin-left: 6px; color: var(--text-dim); }
  .nav-tab.active .tc { background: rgba(59,130,246,0.15); color: var(--blue); }
  .main { padding: 32px 48px; }
  .panel { display: none; }
  .panel.active { display: block; animation: fadeIn 0.2s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 32px; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
  .sl { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-dim); margin-bottom: 8px; }
  .sv { font-size: 36px; font-weight: 700; letter-spacing: -1px; }
  .ss { font-size: 12px; color: var(--text-dim); margin-top: 4px; }
  .section-title { font-size: 18px; font-weight: 600; margin-bottom: 16px; }
  .section-desc { font-size: 13px; color: var(--text-muted); margin-bottom: 20px; max-width: 700px; }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 32px; }
  .grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; margin-bottom: 32px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
  .card-title { font-size: 14px; font-weight: 700; margin-bottom: 4px; }
  .card-sub { font-size: 12px; color: var(--text-dim); margin-bottom: 12px; }
  .card-item { font-size: 13px; color: var(--text-muted); padding: 4px 0; display: flex; align-items: center; gap: 8px; }
  .badge { font-size: 11px; padding: 4px 10px; border-radius: 6px; font-weight: 600; white-space: nowrap; display: inline-block; }
  .b-free { background: var(--green-bg); color: var(--green); border: 1px solid var(--green-border); }
  .b-paid { background: var(--red-bg); color: var(--red); border: 1px solid var(--red-border); }
  .b-partial { background: var(--amber-bg); color: var(--amber); border: 1px solid var(--amber-border); }
  .b-api { background: var(--blue-bg); color: var(--blue); border: 1px solid var(--blue-border); }
  .b-soap { background: var(--purple-bg); color: var(--purple); border: 1px solid var(--purple-border); }
  .b-dump { background: var(--cyan-bg); color: var(--cyan); border: 1px solid var(--cyan-border); }
  .b-ws { background: var(--orange-bg); color: var(--orange); border: 1px solid var(--orange-border); }
  .b-critical { background: var(--red-bg); color: var(--red); border: 1px solid var(--red-border); }
  .b-high { background: var(--amber-bg); color: var(--amber); border: 1px solid var(--amber-border); }
  .b-medium { background: var(--blue-bg); color: var(--blue); border: 1px solid var(--blue-border); }
  .b-integrated { background: var(--green-bg); color: var(--green); border: 1px solid var(--green-border); }

  /* Source cards */
  .src-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; margin-bottom: 24px; overflow: hidden; transition: border-color 0.2s; }
  .src-card:hover { border-color: var(--text-dim); }
  .src-head { padding: 24px 28px; display: flex; align-items: flex-start; justify-content: space-between; border-bottom: 1px solid var(--border); cursor: pointer; user-select: none; }
  .src-head:hover { background: var(--surface2); }
  .src-left { flex: 1; }
  .src-name { font-size: 20px; font-weight: 700; margin-bottom: 4px; display: flex; align-items: center; gap: 12px; }
  .src-czech { font-size: 13px; color: var(--text-muted); margin-bottom: 8px; }
  .src-desc { font-size: 13px; color: var(--text-muted); max-width: 700px; }
  .src-right { display: flex; flex-direction: column; align-items: flex-end; gap: 8px; }
  .src-badges { display: flex; gap: 8px; flex-wrap: wrap; }
  .chevron { transition: transform 0.2s; color: var(--text-dim); font-size: 14px; margin-top: 6px; }
  .src-card.open .chevron { transform: rotate(90deg); }
  .src-body { max-height: 0; overflow: hidden; transition: max-height 0.4s ease; }
  .src-card.open .src-body { max-height: 6000px; }
  .src-inner { padding: 28px; }

  /* Detail grid */
  .det-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }
  .det-box { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 18px; }
  .det-box.full { grid-column: 1 / -1; }
  .det-title { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-dim); margin-bottom: 10px; font-weight: 600; }
  .det-val { font-size: 13px; color: var(--text); }
  .det-val a { color: var(--blue); text-decoration: none; }
  .det-val a:hover { text-decoration: underline; }

  /* Code blocks */
  .code-block {
    background: #0d0f14; border: 1px solid var(--border); border-radius: 8px;
    padding: 16px 20px; font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 12px; line-height: 1.7; overflow-x: auto; color: var(--text-muted);
    margin-top: 8px; white-space: pre;
  }
  .k { color: var(--blue); }
  .s { color: var(--green); }
  .n { color: var(--amber); }
  .b { color: var(--purple); }
  .t { color: var(--pink); }
  .c { color: var(--text-dim); font-style: italic; }
  .a { color: var(--cyan); }

  /* Field tags */
  .field-list { display: flex; flex-wrap: wrap; gap: 6px; }
  .field-tag { background: var(--surface3); border: 1px solid var(--border); border-radius: 6px; padding: 3px 10px; font-size: 12px; color: var(--text-muted); font-family: 'SF Mono', monospace; }

  /* Endpoint rows */
  .ep-row { display: flex; align-items: flex-start; gap: 10px; font-size: 13px; margin-bottom: 6px; }
  .ep-method { background: var(--surface3); border-radius: 4px; padding: 2px 8px; font-family: 'SF Mono', monospace; font-size: 11px; font-weight: 600; color: var(--blue); white-space: nowrap; }
  .ep-path { font-family: 'SF Mono', monospace; font-size: 12px; color: var(--text); word-break: break-all; }
  .ep-desc { color: var(--text-dim); flex-shrink: 0; font-size: 12px; }

  /* Limitation rows */
  .lim-row { display: flex; align-items: flex-start; gap: 8px; font-size: 13px; color: var(--text-muted); margin-bottom: 6px; }
  .lim-icon { color: var(--amber); flex-shrink: 0; }

  /* Comparison table */
  .ctbl { width: 100%; border-collapse: separate; border-spacing: 0; margin-bottom: 32px; font-size: 13px; }
  .ctbl thead th { background: var(--surface2); padding: 12px 16px; text-align: left; font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); border-bottom: 1px solid var(--border); position: sticky; top: 46px; z-index: 50; }
  .ctbl thead th:first-child { border-radius: 8px 0 0 0; }
  .ctbl thead th:last-child { border-radius: 0 8px 0 0; }
  .ctbl td { padding: 10px 16px; border-bottom: 1px solid rgba(54,58,78,0.4); vertical-align: top; }
  .ctbl tr:hover td { background: var(--surface); }
  .fc { font-family: 'SF Mono', 'Fira Code', monospace; font-size: 12px; }

  /* Filter bar */
  .filter-bar { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
  .fb { padding: 6px 14px; font-size: 12px; font-weight: 500; border-radius: 8px; border: 1px solid var(--border); background: var(--surface); color: var(--text-muted); cursor: pointer; transition: all 0.2s; font-family: inherit; }
  .fb:hover { border-color: var(--text-dim); color: var(--text); }
  .fb.active { background: var(--surface3); color: var(--text); border-color: var(--text-dim); }

  /* Roadmap card */
  .road-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 24px 28px; margin-bottom: 20px; }
  .road-item { display: flex; align-items: flex-start; gap: 16px; padding: 12px 16px; background: var(--surface2); border-radius: 10px; border: 1px solid var(--border); margin-bottom: 10px; }
  .road-item:last-child { margin-bottom: 0; }
  .road-item-left { flex: 1; }
  .road-item-name { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
  .road-item-desc { font-size: 12px; color: var(--text-muted); }
  .road-item-right { text-align: right; flex-shrink: 0; }
  .road-item-effort { font-size: 12px; font-weight: 600; }
  .road-item-time { font-size: 11px; color: var(--text-dim); margin-top: 2px; }

  @media (max-width: 900px) {
    .header, .nav, .main { padding-left: 20px; padding-right: 20px; }
    .stats-row { grid-template-columns: repeat(2, 1fr); }
    .det-grid, .grid2 { grid-template-columns: 1fr; }
    .grid3 { grid-template-columns: 1fr; }
    .src-head { flex-direction: column; gap: 12px; }
  }
  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 4px; }
</style>
</head>

function gc(s){return CM[s.col]||'var(--text)'}
function cb(c){return c==='free'?'<span class="badge b-free">FREE</span>':c==='paid'?'<span class="badge b-paid">PAID</span>':'<span class="badge b-partial">PARTIAL</span>'}
function ab(m){const M={api:'b-api',soap:'b-soap',dump:'b-dump',ws:'b-ws'};const L={api:'REST API',soap:'SOAP',dump:'BULK DUMP',ws:'WEB SERVICE'};return '<span class="badge '+(M[m]||'b-api')+'">'+(L[m]||m)+'</span>'}
function rb(l){const M={critical:'b-critical',high:'b-high',medium:'b-medium'};const L={critical:'CRITICAL',high:'HIGH',medium:'MEDIUM'};return '<span class="badge '+(M[l])+'">'+L[l]+'</span>'}

// ============ STATE ============
const st = {tab:'overview',filter:'all',open:new Set()};

function buildNav(){
  const nav=document.getElementById('nav');
  [{id:'overview',l:'Overview'},{id:'sources',l:'Data Sources',c:S.length},{id:'comparison',l:'Comparison Table'},{id:'roadmap',l:'Integration Roadmap'}].forEach(t=>{
    const b=document.createElement('button');
    b.className='nav-tab'+(t.id===st.tab?' active':'');
    b.dataset.tab=t.id;
    const tx=document.createTextNode(t.l);
    b.appendChild(tx);
    if(t.c){const sp=document.createElement('span');sp.className='tc';sp.textContent=t.c;b.appendChild(sp);}
    b.addEventListener('click',()=>{
      st.tab=t.id;
      document.querySelectorAll('.nav-tab').forEach(x=>x.classList.toggle('active',x.dataset.tab===t.id));
      document.querySelectorAll('.panel').forEach(p=>p.classList.toggle('active',p.id==='panel-'+t.id));
    });
    nav.appendChild(b);
  });
}

// ============ OVERVIEW ============
function buildOverview(){
  const p=document.createElement('div');p.className='panel active';p.id='panel-overview';

  // Stats
  const sr=document.createElement('div');sr.className='stats-row';
  [{l:'DATA SOURCES',v:String(S.length),s:'Czech public registers and aggregators',c:'var(--blue)'},
   {l:'FREE ACCESS',v:String(S.filter(x=>x.cost==='free').length),s:'No registration or payment required',c:'var(--green)'},
   {l:'CRITICAL RISK',v:String(S.filter(x=>x.risk==='critical').length),s:'Insolvency, VAT unreliability, executions',c:'var(--red)'},
   {l:'REST/JSON APIs',v:String(S.filter(x=>x.access==='api').length),s:'Including commercial and web-based',c:'var(--purple)'}
  ].forEach(s=>{
    const c=document.createElement('div');c.className='stat-card';
    const lbl=document.createElement('div');lbl.className='sl';lbl.textContent=s.l;
    const val=document.createElement('div');val.className='sv';val.textContent=s.v;val.style.color=s.c;
    const sub=document.createElement('div');sub.className='ss';sub.textContent=s.s;
    c.append(lbl,val,sub);sr.appendChild(c);
  });
  p.appendChild(sr);

  // Risk matrix
  const mt=document.createElement('div');mt.className='section-title';mt.textContent='Risk Signal Matrix';p.appendChild(mt);
  const mg=document.createElement('div');mg.className='grid3';
  [{lv:'critical',l:'Critical Risk Signals',d:'Immediate red flags \u2014 should block or warn',c:'var(--red)'},
   {lv:'high',l:'High Risk Signals',d:'Serious concerns \u2014 due diligence required',c:'var(--amber)'},
   {lv:'medium',l:'Business Intelligence',d:'Context and patterns \u2014 enrichment data',c:'var(--blue)'}
  ].forEach(g=>{
    const c=document.createElement('div');c.className='card';c.style.borderTop='3px solid '+g.c;
    const t=document.createElement('div');t.className='card-title';t.style.color=g.c;t.textContent=g.l;
    const d=document.createElement('div');d.className='card-sub';d.textContent=g.d;
    c.append(t,d);
    S.filter(x=>x.risk===g.lv).forEach(s=>{
      const i=document.createElement('div');i.className='card-item';
      const ic=document.createTextNode(s.icon+' '+s.name+' ');
      i.appendChild(ic);
      const bd=document.createElement('span');
      if(s.cost==='free'){bd.className='badge b-free';bd.textContent='FREE';}
      else if(s.cost==='paid'){bd.className='badge b-paid';bd.textContent='PAID';}
      else{bd.className='badge b-partial';bd.textContent='PARTIAL';}
      i.appendChild(bd);
      c.appendChild(i);
    });
    mg.appendChild(c);
  });
  p.appendChild(mg);

  // Access methods
  const at=document.createElement('div');at.className='section-title';at.textContent='Access Method Breakdown';p.appendChild(at);
  const ag=document.createElement('div');ag.className='grid2';
  [{k:'api',l:'REST API / Web Interface',d:'Direct HTTP request-response or web-based. Varied integration complexity.',c:'var(--blue)',items:S.filter(x=>x.access==='api')},
   {k:'soap',l:'SOAP Web Service (XML)',d:'XML envelope-based. Requires SOAP client library (zeep).',c:'var(--purple)',items:S.filter(x=>x.access==='soap')},
   {k:'ws',l:'Web Service + Event Stream',d:'SOAP queries + real-time event feed for incremental sync.',c:'var(--orange)',items:S.filter(x=>x.access==='ws')},
   {k:'dump',l:'Bulk Data Dump (XML/CSV)',d:'Periodic file downloads. Similar to Justice sync pattern.',c:'var(--cyan)',items:S.filter(x=>x.access==='dump')}
  ].forEach(m=>{
    const c=document.createElement('div');c.className='card';c.style.borderLeft='3px solid '+m.c;
    const t=document.createElement('div');t.className='card-title';t.style.color=m.c;t.textContent=m.l;
    const d=document.createElement('div');d.className='card-sub';d.textContent=m.d;
    c.append(t,d);
    m.items.forEach(s=>{
      const i=document.createElement('div');i.className='card-item';i.textContent=s.icon+' '+s.name;c.appendChild(i);
    });
    ag.appendChild(c);
  });
  p.appendChild(ag);

  // Hub-spoke
  const ht=document.createElement('div');ht.className='section-title';ht.textContent='Hub-and-Spoke Architecture Fit';p.appendChild(ht);
  const hd=document.createElement('div');hd.className='section-desc';
  hd.textContent='Each source fits into your existing hub-and-spoke architecture as either a full "spoke" (dedicated Django app with own models, FK to Company) or a lightweight "enrichment" (cached API call, no persistent model needed).';
  p.appendChild(hd);
  const hg=document.createElement('div');hg.className='grid2';
  [{l:'Full Spokes (own Django app + models)',items:S.filter(x=>x.hub==='spoke'),c:'var(--blue)',d:'Persistent data in PostgreSQL, bulk sync or import'},
   {l:'Enrichment Layers (cached API calls)',items:S.filter(x=>x.hub==='enrichment'),c:'var(--purple)',d:'On-demand lookups cached in Redis, no own DB tables'}
  ].forEach(g=>{
    const c=document.createElement('div');c.className='card';c.style.borderLeft='3px solid '+g.c;
    const t=document.createElement('div');t.className='card-title';t.style.color=g.c;t.textContent=g.l;
    const d=document.createElement('div');d.className='card-sub';d.textContent=g.d;
    c.append(t,d);
    g.items.forEach(s=>{
      const i=document.createElement('div');i.className='card-item';
      const tx=document.createTextNode(s.icon+' '+s.name+' ');
      i.appendChild(tx);
      const bd=document.createElement('span');
      if(s.cost==='free'){bd.className='badge b-free';bd.textContent='FREE';}
      else if(s.cost==='paid'){bd.className='badge b-paid';bd.textContent='PAID';}
      else{bd.className='badge b-partial';bd.textContent='PARTIAL';}
      i.appendChild(bd);
      c.appendChild(i);
    });
    hg.appendChild(c);
  });
  p.appendChild(hg);
  return p;
}

// ============ SOURCES ============
function buildSources(){
  const p=document.createElement('div');p.className='panel';p.id='panel-sources';
  const fb=document.createElement('div');fb.className='filter-bar';
  [{f:'all',l:'All Sources'},{f:'critical',l:'Critical Risk'},{f:'high',l:'High Risk'},{f:'medium',l:'Business Intel'},{f:'free',l:'Free Only'}].forEach(x=>{
    const b=document.createElement('button');b.className='fb'+(x.f==='all'?' active':'');b.textContent=x.l;
    b.addEventListener('click',()=>{
      st.filter=x.f;fb.querySelectorAll('.fb').forEach(y=>y.classList.remove('active'));b.classList.add('active');renderSources();
    });
    fb.appendChild(b);
  });
  p.appendChild(fb);
  const c=document.createElement('div');c.id='src-container';p.appendChild(c);
  return p;
}

function renderSources(){
  const c=document.getElementById('src-container');if(!c)return;
  while(c.firstChild)c.removeChild(c.firstChild);
  let f=S;
  if(st.filter==='critical')f=S.filter(x=>x.risk==='critical');
  else if(st.filter==='high')f=S.filter(x=>x.risk==='high');
  else if(st.filter==='medium')f=S.filter(x=>x.risk==='medium');
  else if(st.filter==='free')f=S.filter(x=>x.cost==='free');

  f.forEach(s=>{
    const card=document.createElement('div');
    card.className='src-card'+(st.open.has(s.id)?' open':'');
    card.id='src-'+s.id;
    const col=gc(s);

    // Header
    const hd=document.createElement('div');hd.className='src-head';
    hd.addEventListener('click',()=>{
      if(st.open.has(s.id))st.open.delete(s.id);else st.open.add(s.id);
      card.classList.toggle('open');
    });
    const left=document.createElement('div');left.className='src-left';
    const nm=document.createElement('div');nm.className='src-name';nm.style.color=col;nm.textContent=s.icon+' '+s.name;
    const cz=document.createElement('div');cz.className='src-czech';cz.textContent=s.cz;
    const ds=document.createElement('div');ds.className='src-desc';ds.textContent=s.desc;
    left.append(nm,cz,ds);

    const right=document.createElement('div');right.className='src-right';
    const badges=document.createElement('div');badges.className='src-badges';
    const rb1=document.createElement('span');rb1.className='badge b-'+s.risk;rb1.textContent=s.risk.toUpperCase();
    const cb1=document.createElement('span');
    if(s.cost==='free'){cb1.className='badge b-free';cb1.textContent='FREE';}
    else if(s.cost==='paid'){cb1.className='badge b-paid';cb1.textContent='PAID';}
    else{cb1.className='badge b-partial';cb1.textContent='PARTIAL';}
    const ab1=document.createElement('span');
    const aM={api:'b-api',soap:'b-soap',dump:'b-dump',ws:'b-ws'};
    const aL={api:'REST API',soap:'SOAP',dump:'BULK DUMP',ws:'WEB SERVICE'};
    ab1.className='badge '+(aM[s.access]||'b-api');ab1.textContent=aL[s.access]||s.access;
    badges.append(rb1,cb1,ab1);
    const chv=document.createElement('span');chv.className='chevron';chv.textContent='\u25B6';
    right.append(badges,chv);
    hd.append(left,right);

    // Body
    const body=document.createElement('div');body.className='src-body';
    const inner=document.createElement('div');inner.className='src-inner';
    const grid=document.createElement('div');grid.className='det-grid';

    // Info boxes
    [{t:'Operator',v:s.operator},{t:'Website',v:'<a href="'+s.web+'" target="_blank">'+s.web.replace('https://','')+'</a>'},
     {t:'Cost',v:s.costNote},{t:'Update Frequency',v:s.freq}].forEach(b=>{
      const box=document.createElement('div');box.className='det-box';
      const bt=document.createElement('div');bt.className='det-title';bt.textContent=b.t;
      const bv=document.createElement('div');bv.className='det-val';
      if(b.v.includes('<a ')){bv.innerHTML=b.v;}else{bv.textContent=b.v;}
      box.append(bt,bv);grid.appendChild(box);
    });

    // Access method (full width)
    const accBox=document.createElement('div');accBox.className='det-box full';
    const accT=document.createElement('div');accT.className='det-title';accT.textContent='Access Method \u2014 '+s.accessLabel;
    const accV=document.createElement('div');accV.className='det-val';accV.textContent=s.accessDesc;
    accBox.append(accT,accV);grid.appendChild(accBox);

    // Endpoints
    const epBox=document.createElement('div');epBox.className='det-box full';
    const epT=document.createElement('div');epT.className='det-title';epT.textContent='Endpoints / Access Points';
    epBox.appendChild(epT);
    s.ep.forEach(e=>{
      const row=document.createElement('div');row.className='ep-row';
      const m=document.createElement('span');m.className='ep-method';m.textContent=e.m;
      const pa=document.createElement('span');pa.className='ep-path';pa.textContent=e.p;
      const d=document.createElement('span');d.className='ep-desc';d.textContent='\u2014 '+e.d;
      row.append(m,pa,d);epBox.appendChild(row);
    });
    if(s.rate){
      const rl=document.createElement('div');rl.style.cssText='margin-top:10px;font-size:12px;color:var(--text-dim);';
      rl.textContent='Rate limit: '+s.rate;epBox.appendChild(rl);
    }
    grid.appendChild(epBox);

    // Fields
    const flBox=document.createElement('div');flBox.className='det-box full';
    const flT=document.createElement('div');flT.className='det-title';flT.textContent='Data Fields';
    const flL=document.createElement('div');flL.className='field-list';
    s.fields.forEach(f=>{const t=document.createElement('span');t.className='field-tag';t.textContent=f;flL.appendChild(t);});
    flBox.append(flT,flL);grid.appendChild(flBox);

    // Example
    const exBox=document.createElement('div');exBox.className='det-box full';
    const exT=document.createElement('div');exT.className='det-title';exT.textContent='Example Response ('+s.fmt.toUpperCase()+')';
    const exC=document.createElement('div');exC.className='code-block';exC.innerHTML=s.example;
    exBox.append(exT,exC);grid.appendChild(exBox);

    // Limitations
    const limBox=document.createElement('div');limBox.className='det-box full';
    const limT=document.createElement('div');limT.className='det-title';limT.textContent='Limitations & Gotchas';
    limBox.appendChild(limT);
    s.lim.forEach(l=>{
      const row=document.createElement('div');row.className='lim-row';
      const ic=document.createElement('span');ic.className='lim-icon';ic.textContent='\u26A1';
      const tx=document.createElement('span');tx.textContent=l;
      row.append(ic,tx);limBox.appendChild(row);
    });
    grid.appendChild(limBox);

    // Integration
    const intBox=document.createElement('div');intBox.className='det-box full';
    const intT=document.createElement('div');intT.className='det-title';intT.textContent='Integration Strategy (Hub-and-Spoke: '+s.hub+')';
    const intV=document.createElement('div');intV.className='det-val';intV.textContent=s.integration;
    intBox.append(intT,intV);grid.appendChild(intBox);

    inner.appendChild(grid);body.appendChild(inner);card.append(hd,body);c.appendChild(card);
  });
}

// ============ COMPARISON ============
function buildComparison(){
  const p=document.createElement('div');p.className='panel';p.id='panel-comparison';
  const t=document.createElement('div');t.className='section-title';t.textContent='Side-by-Side Comparison';p.appendChild(t);

  const tbl=document.createElement('table');tbl.className='ctbl';
  const thead=document.createElement('thead');
  const hr=document.createElement('tr');
  ['Source','Risk','Cost','Access','Format','Update','Effort','Hub Role','Key Signal'].forEach((h,i)=>{
    const th=document.createElement('th');th.textContent=h;
    th.style.width=['16%','9%','8%','11%','8%','12%','8%','10%','18%'][i];
    hr.appendChild(th);
  });
  thead.appendChild(hr);tbl.appendChild(thead);

  const tbody=document.createElement('tbody');
  const signals={isir:'Active insolvency',vat:'VAT unreliability',esm:'Opaque ownership',rzp:'No active license',croe:'Forced debt collection',smlouvy:'State contract patterns',cedr:'Subsidy dependency',hlidac:'Contract risk scores',isvz:'Tender concentration',katastr:'Property liens'};
  const efforts={paid:'High',soap:'Medium',ws:'Medium',dump:'Medium',api:'Low'};

  S.forEach(s=>{
    const tr=document.createElement('tr');
    const col=gc(s);
    const effort=s.cost==='paid'?'High':(efforts[s.access]||'Low');
    const efCol=effort==='Low'?'var(--green)':effort==='Medium'?'var(--amber)':'var(--red)';

    const td1=document.createElement('td');
    const nm=document.createElement('span');nm.style.cssText='color:'+col+';font-weight:600;';nm.textContent=s.icon+' '+s.name;
    td1.appendChild(nm);

    const td2=document.createElement('td');
    const rb2=document.createElement('span');rb2.className='badge b-'+s.risk;rb2.textContent=s.risk.toUpperCase();
    td2.appendChild(rb2);

    const td3=document.createElement('td');
    const cb2=document.createElement('span');
    if(s.cost==='free'){cb2.className='badge b-free';cb2.textContent='FREE';}
    else if(s.cost==='paid'){cb2.className='badge b-paid';cb2.textContent='PAID';}
    else{cb2.className='badge b-partial';cb2.textContent='PARTIAL';}
    td3.appendChild(cb2);

    const td4=document.createElement('td');
    const aM2={api:'b-api',soap:'b-soap',dump:'b-dump',ws:'b-ws'};
    const aL2={api:'REST API',soap:'SOAP',dump:'DUMP',ws:'WEB SVC'};
    const ab2=document.createElement('span');ab2.className='badge '+(aM2[s.access]||'b-api');ab2.textContent=aL2[s.access]||s.access;
    td4.appendChild(ab2);

    const td5=document.createElement('td');td5.className='fc';td5.textContent=s.fmt.toUpperCase();
    const td6=document.createElement('td');td6.style.cssText='font-size:12px;color:var(--text-muted);';td6.textContent=s.freq.split('.')[0];
    const td7=document.createElement('td');
    const ef=document.createElement('span');ef.style.cssText='color:'+efCol+';font-weight:600;font-size:12px;';ef.textContent=effort;
    td7.appendChild(ef);
    const td8=document.createElement('td');td8.style.cssText='font-size:12px;color:var(--text-muted);';td8.textContent=s.hub==='spoke'?'\uD83D\uDD17 Spoke':'\u2728 Enrichment';
    const td9=document.createElement('td');td9.style.cssText='font-size:12px;color:var(--text-muted);';td9.textContent=signals[s.id]||'\u2014';

    tr.append(td1,td2,td3,td4,td5,td6,td7,td8,td9);
    tbody.appendChild(tr);
  });
  tbl.appendChild(tbody);p.appendChild(tbl);

  // Already integrated
  const et=document.createElement('div');et.className='section-title';et.style.marginTop='16px';et.textContent='Already Integrated';p.appendChild(et);
  const eg=document.createElement('div');eg.className='grid2';
  [{n:'ARES',d:'REST API \u00B7 JSON \u00B7 Real-time \u00B7 Free',t:'Administrative Register of Economic Entities. Real-time API with Redis caching. ~68 fields including 16 register statuses, addresses, NACE codes, VAT IDs.'},
   {n:'Justice Register',d:'XML Dump \u00B7 Bulk Sync \u00B7 PostgreSQL \u00B7 Free',t:'Commercial/Court Registry (or.justice.cz). Bulk XML sync via CKAN. ~35 fields including people, shareholders, capital, insolvency facts, court references.'}
  ].forEach(x=>{
    const c=document.createElement('div');c.className='card';c.style.borderLeft='3px solid var(--green)';c.style.borderColor='var(--green-border)';
    const n=document.createElement('div');n.className='card-title';n.style.color='var(--green)';n.textContent=x.n;
    const d=document.createElement('div');d.className='card-sub';d.textContent=x.d;
    const t2=document.createElement('div');t2.style.cssText='font-size:13px;color:var(--text-muted);margin-bottom:8px;';t2.textContent=x.t;
    const b=document.createElement('span');b.className='badge b-integrated';b.textContent='INTEGRATED';
    c.append(n,d,t2,b);eg.appendChild(c);
  });
  p.appendChild(eg);
  return p;
}

// ============ ROADMAP ============
function buildRoadmap(){
  const p=document.createElement('div');p.className='panel';p.id='panel-roadmap';
  const t=document.createElement('div');t.className='section-title';t.textContent='Recommended Integration Roadmap';p.appendChild(t);
  const d=document.createElement('div');d.className='section-desc';d.textContent='Prioritized by risk detection value vs implementation effort. Each phase is independently deployable.';p.appendChild(d);

  const phases=[
    {l:'Phase 1 \u2014 Quick Wins',d:'Highest value, lowest effort. Can be done in days.',c:'var(--green)',items:[
      {n:'Nespolehliv\u00fd pl\u00e1tce DPH',e:'Low',r:'Single SOAP call per company. Cache in Redis. Critical risk for anyone doing B2B.',t:'1\u20132 days'},
      {n:'Hl\u00edda\u010d st\u00e1tu API',e:'Low',r:'REST + JSON. Free API key. Instant access to aggregated contract data + risk scores.',t:'1\u20132 days'}
    ]},
    {l:'Phase 2 \u2014 Core Risk Signals',d:'Critical risk data that requires more integration work.',c:'var(--amber)',items:[
      {n:'ISIR (Insolvency)',e:'Medium',r:'SOAP web service. Similar to Justice in complexity. Most important risk signal after VAT.',t:'3\u20135 days'},
      {n:'CEDR (Subsidies)',e:'Medium',r:'CSV bulk import. Four tables to join. Good business context.',t:'2\u20133 days'}
    ]},
    {l:'Phase 3 \u2014 Deep Business Intelligence',d:'Valuable enrichment data. Higher effort, but strong analytical value.',c:'var(--blue)',items:[
      {n:'Registr smluv (Contracts)',e:'Medium',r:'XML bulk dump \u2014 same pattern as Justice. Large files. Monthly sync job.',t:'3\u20135 days'},
      {n:'R\u017dP (Trade Register)',e:'Medium',r:'Extends existing ARES status data with full license details.',t:'2\u20134 days'},
      {n:'ISVZ (Procurement)',e:'Medium',r:'XLS/XML bulk data. Tender analysis reveals procurement patterns.',t:'3\u20135 days'}
    ]},
    {l:'Phase 4 \u2014 Premium Sources',d:'High value but requires paid access or complex integration.',c:'var(--purple)',items:[
      {n:'ESM (Beneficial Owners)',e:'High',r:'No official API. Requires commercial provider or careful web scraping.',t:'5\u201310 days'},
      {n:'CROE (Executions)',e:'High',r:'Paid API only. Requires commercial agreement with data provider.',t:'3\u20135 days + contract'},
      {n:'Katastr (Real Estate)',e:'High',r:'Paid bulk access. Complex property data model. Phase 4+ only.',t:'5\u201310 days + contract'}
    ]}
  ];

  phases.forEach(ph=>{
    const c=document.createElement('div');c.className='road-card';c.style.borderLeft='4px solid '+ph.c;
    const ht=document.createElement('div');ht.className='card-title';ht.style.cssText='font-size:16px;color:'+ph.c+';margin-bottom:4px;';ht.textContent=ph.l;
    const hd=document.createElement('div');hd.className='card-sub';hd.textContent=ph.d;hd.style.marginBottom='16px';
    c.append(ht,hd);

    ph.items.forEach(item=>{
      const row=document.createElement('div');row.className='road-item';
      const left=document.createElement('div');left.className='road-item-left';
      const nm=document.createElement('div');nm.className='road-item-name';nm.textContent=item.n;
      const ds=document.createElement('div');ds.className='road-item-desc';ds.textContent=item.r;
      left.append(nm,ds);

      const right=document.createElement('div');right.className='road-item-right';
      const ef=document.createElement('div');ef.className='road-item-effort';
      ef.style.color=item.e==='Low'?'var(--green)':item.e==='Medium'?'var(--amber)':'var(--red)';
      ef.textContent=item.e+' Effort';
      const tm=document.createElement('div');tm.className='road-item-time';tm.textContent=item.t;
      right.append(ef,tm);

      row.append(left,right);c.appendChild(row);
    });
    p.appendChild(c);
  });
  return p;
}

// ============ INIT ============
function init(){
  buildNav();
  const m=document.getElementById('main-content');
  m.appendChild(buildOverview());
  m.appendChild(buildSources());
  m.appendChild(buildComparison());
  m.appendChild(buildRoadmap());
  renderSources();
}
init();
</script>
</body>
</html>
