  .atit.aat { color: var(--ares); }
  .atit.jat { color: var(--justice); }
  .astp { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 16px; }

    .categories-grid { grid-template-columns: 1fr; }
  }

  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 4px; }
</style>

    { name: 'statutarni_organ', desc: 'Statutory body definition', ares: false, justice: true, cat: 'Financial' },
    { name: 'institutionalSector2010', desc: 'Institutional sector classification', ares: true, justice: false, cat: 'Statistical' },
    { name: 'employeeCountCategory', desc: 'Employee count category', ares: true, justice: false, cat: 'Statistical' },
  ];

  const categories = [
    { id: 'Core', label: 'Core Company Data', emoji: '\u{1F3E2}', desc: 'Identity, legal form, dates, tax IDs' },
    { id: 'Address', label: 'Address Data', emoji: '\u{1F4CD}', desc: 'Headquarters, delivery, geocoding' },
    { id: 'Registers', label: 'Registration Statuses', emoji: '\u{1F4CB}', desc: '16 government register statuses' },
    { id: 'Activities', label: 'Activity Classification', emoji: '\u{1F3ED}', desc: 'NACE codes vs text descriptions' },
    { id: 'People', label: 'People & Roles', emoji: '\u{1F464}', desc: 'Directors, members, shareholders' },
    { id: 'Legal', label: 'Legal & Court Data', emoji: '\u{2696}\u{FE0F}', desc: 'Court files, insolvency, liquidation' },
    { id: 'Financial', label: 'Financial Data', emoji: '\u{1F4B0}', desc: 'Capital, shares, statutory bodies' },
    { id: 'Statistical', label: 'Statistical Data', emoji: '\u{1F4CA}', desc: 'Sector classification, employee count' },
  ];

  // ============ STATE ============
  const state = { activeTab: 'overview', filter: 'all', search: '', openCats: new Set() };

  function esc(str) {
    const d = document.createElement('div');
    d.textContent = str;
    return d.textContent;
  }

  function getSource(f) {
    if (f.ares && f.justice) return 'both';
    return f.ares ? 'ares' : 'justice';
  }

  // ============ BUILD NAV ============
  function buildNav() {
    const nav = document.getElementById('nav');
    const tabs = [
      { id: 'overview', label: 'Overview' },
      { id: 'fields', label: 'Field-by-Field', count: fields.length },
      { id: 'architecture', label: 'Architecture' },
      { id: 'categories', label: 'By Category', count: categories.filter(c => fields.some(f => f.cat === c.id)).length },
    ];
    tabs.forEach(t => {
      const btn = document.createElement('button');
      btn.className = 'nav-tab' + (t.id === state.activeTab ? ' active' : '');
      btn.dataset.tab = t.id;
      btn.textContent = t.label;
      if (t.count) {
        const sp = document.createElement('span');
        sp.className = 'tc';
        sp.id = t.id === 'fields' ? 'field-count' : '';
        sp.textContent = t.count;
        btn.appendChild(sp);
      }
      btn.addEventListener('click', () => switchTab(t.id));
      nav.appendChild(btn);
    });
  }

  function switchTab(id) {
    state.activeTab = id;
    document.querySelectorAll('.nav-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === id));
    document.querySelectorAll('.panel').forEach(p => p.classList.toggle('active', p.id === 'panel-' + id));
  }

  // ============ BUILD OVERVIEW ============
  function buildOverview() {
    const panel = document.createElement('div');
    panel.className = 'panel active';
    panel.id = 'panel-overview';

    // Stats
    const statsDiv = document.createElement('div');
    statsDiv.className = 'stats-row';
    const statsData = [
      { cls: 'ac', label: 'ARES FIELDS', value: '~68', sub: '29 address + 16 register + 13 core + 10 other' },
      { cls: 'jc', label: 'JUSTICE FIELDS', value: '~35', sub: '12 address + 7 core + people + facts' },
      { cls: 'oc', label: 'OVERLAP', value: '~10', sub: 'ICO, name, legal form, dates, address basics' },
      { cls: 'nc', label: 'ARES UNIQUE', value: '~58', sub: 'Geo codes, VAT, NACE, 16 register statuses' },
      { cls: 'nc', label: 'JUSTICE UNIQUE', value: '~25', sub: 'People, roles, capital, insolvency, court' },
    ];
    statsData.forEach(s => {
      const card = document.createElement('div');
      card.className = 'stat-card ' + s.cls;
      const lbl = document.createElement('div'); lbl.className = 'sl'; lbl.textContent = s.label;
      const val = document.createElement('div'); val.className = 'sv'; val.textContent = s.value;
      const sub = document.createElement('div'); sub.className = 'ss'; sub.textContent = s.sub;
      card.append(lbl, val, sub);
      statsDiv.appendChild(card);
    });
    panel.appendChild(statsDiv);

    // Insights
    const insRow = document.createElement('div');
    insRow.className = 'insights-row';

    const aresItems = ['29-field geocodable addresses', 'NACE activity codes', '16 register statuses', 'Czech + Slovak VAT IDs', 'Tax office assignment', 'Employee count category', 'Region/district/municipality codes', 'Real-time API \u00B7 15s timeout'];
    const justiceItems = ['Directors, statutory members', 'Shareholders & capital', 'Court file references', '42 fact types (insolvency, liquidation...)', 'Full change history timeline', 'Business activity descriptions', 'Hierarchical sub-facts', 'Bulk XML import \u2192 PostgreSQL'];

    [{ cls: 'ai', tag: '"Where & What"', sub: 'Administrative, geographic & regulatory data', items: aresItems },
     { cls: 'ji', tag: '"Who & When"', sub: 'People, ownership, legal & corporate history', items: justiceItems }].forEach(ins => {
      const card = document.createElement('div');
      card.className = 'ic ' + ins.cls;
      const tagEl = document.createElement('div'); tagEl.className = 'itag'; tagEl.textContent = ins.tag;
      const subEl = document.createElement('div'); subEl.className = 'isub'; subEl.textContent = ins.sub;
      const list = document.createElement('ul'); list.className = 'ilist';
      ins.items.forEach(item => {
        const li = document.createElement('li'); li.textContent = item; list.appendChild(li);
      });
      card.append(tagEl, subEl, list);
      insRow.appendChild(card);
    });
    panel.appendChild(insRow);

    // Bar chart
    const barTitle = document.createElement('div');
    barTitle.className = 'st';
    barTitle.textContent = 'Field Distribution by Category';
    panel.appendChild(barTitle);

    const barChart = document.createElement('div');
    barChart.className = 'bar-chart';
    const maxF = 30;
    categories.forEach(c => {
      const catFields = fields.filter(f => f.cat === c.id);
      if (catFields.length === 0) return;
      const aOnly = catFields.filter(f => f.ares && !f.justice).length;
      const jOnly = catFields.filter(f => f.justice && !f.ares).length;
      const bth = catFields.filter(f => f.ares && f.justice).length;

      const row = document.createElement('div'); row.className = 'bar-row';
      const label = document.createElement('div'); label.className = 'bl'; label.textContent = c.emoji + ' ' + c.label;
      const track = document.createElement('div'); track.className = 'bt';

      if (aOnly > 0) {
        const fill = document.createElement('div'); fill.className = 'bf abf';
        fill.style.width = ((aOnly / maxF) * 100) + '%'; fill.textContent = aOnly;
        track.appendChild(fill);
      }
      if (bth > 0) {
        const fill = document.createElement('div'); fill.className = 'bf obf';
        fill.style.width = ((bth / maxF) * 100) + '%'; fill.textContent = bth;
        track.appendChild(fill);
      }
      if (jOnly > 0) {
        const fill = document.createElement('div'); fill.className = 'bf jbf';
        fill.style.width = ((jOnly / maxF) * 100) + '%'; fill.textContent = jOnly;
        track.appendChild(fill);
      }
      row.append(label, track);
      barChart.appendChild(row);
    });
    panel.appendChild(barChart);

    // Venn
    const vennTitle = document.createElement('div');
    vennTitle.className = 'st';
    vennTitle.textContent = 'Overlap Diagram';
    panel.appendChild(vennTitle);

    const venn = document.createElement('div');
    venn.className = 'venn-container';

    const aCircle = document.createElement('div'); aCircle.className = 'vc avc';
    const jCircle = document.createElement('div'); jCircle.className = 'vc jvc';
    venn.append(aCircle, jCircle);

    const vennData = [
      { cls: 'avt', title: 'ARES Only', color: 'ares', top: 40, items: ['VAT IDs (CZ + SK)', 'Tax office', '16 register statuses', 'NACE codes', 'Address point codes', 'Region/district codes', 'Delivery address', 'Statistical data', 'Primary source register'] },
      { cls: 'ovt', title: 'Both', color: 'overlap', top: 60, items: ['ICO', 'Company name', 'Legal form', 'Registration date', 'Termination date', 'Active status', 'Street, city, postal', 'House number'] },
      { cls: 'jvt', title: 'Justice Only', color: 'justice', top: 40, items: ['Directors & members', 'Shareholders', 'Registered capital', 'Court references', 'Insolvency status', 'Liquidator info', 'Business activities (text)', 'Full change history', 'Sub-fact hierarchy'] },
    ];
    vennData.forEach(v => {
      const div = document.createElement('div');
      div.className = 'vt ' + v.cls;
      div.style.top = v.top + 'px';
      const h3 = document.createElement('h3'); h3.textContent = v.title;
      const ul = document.createElement('ul');
      v.items.forEach(i => { const li = document.createElement('li'); li.textContent = i; ul.appendChild(li); });
      div.append(h3, ul);
      venn.appendChild(div);
    });
    panel.appendChild(venn);
    return panel;
  }

  // ============ BUILD FIELDS ============
  function buildFields() {
    const panel = document.createElement('div');
    panel.className = 'panel';
    panel.id = 'panel-fields';

    // Filter bar
    const topBar = document.createElement('div');
    topBar.style.cssText = 'display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;';

    const filterBar = document.createElement('div');
    filterBar.className = 'filter-bar';
    [{ f: 'all', l: 'All', c: '' }, { f: 'ares', l: 'ARES Only', c: 'fa' }, { f: 'justice', l: 'Justice Only', c: 'fj' }, { f: 'both', l: 'Both Sources', c: 'fo' }].forEach(fb => {
      const btn = document.createElement('button');
      btn.className = 'fb' + (fb.f === 'all' ? ' active' : '') + (fb.c ? ' ' + fb.c : '');
      btn.dataset.filter = fb.f;
      btn.textContent = fb.l;
      btn.addEventListener('click', () => {
        state.filter = fb.f;
        filterBar.querySelectorAll('.fb').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderFieldsTable();
      });
      filterBar.appendChild(btn);
    });

    const search = document.createElement('input');
    search.type = 'text'; search.className = 'sb'; search.placeholder = 'Search fields\u2026';
    search.addEventListener('input', () => { state.search = search.value; renderFieldsTable(); });

    topBar.append(filterBar, search);
    panel.appendChild(topBar);

    // Legend
    const legend = document.createElement('div');
    legend.className = 'legend';
    [{ c: 'ad', l: 'ARES' }, { c: 'jd', l: 'Justice' }, { c: 'od', l: 'Both' }].forEach(lg => {
      const item = document.createElement('div'); item.className = 'lgi';
      const dot = document.createElement('div'); dot.className = 'lgd ' + lg.c;
      const txt = document.createTextNode(lg.l);
      item.append(dot, txt);
      legend.appendChild(item);
    });
    panel.appendChild(legend);

    // Table
    const table = document.createElement('table');
    table.className = 'ctbl';
    const thead = document.createElement('thead');
    const headRow = document.createElement('tr');
    ['Field', 'Description', 'ARES', 'Justice', 'Category'].forEach((h, i) => {
      const th = document.createElement('th');
      th.textContent = h;
      th.style.width = ['22%', '34%', '16%', '16%', '12%'][i];
      headRow.appendChild(th);
    });
    thead.appendChild(headRow);
    table.appendChild(thead);

    const tbody = document.createElement('tbody');
    tbody.id = 'fields-tbody';
    table.appendChild(tbody);
    panel.appendChild(table);

    return panel;
  }

  function renderFieldsTable() {
    const tbody = document.getElementById('fields-tbody');
    let filtered = fields.slice();

    if (state.filter === 'ares') filtered = filtered.filter(f => f.ares && !f.justice);
    else if (state.filter === 'justice') filtered = filtered.filter(f => f.justice && !f.ares);
    else if (state.filter === 'both') filtered = filtered.filter(f => f.ares && f.justice);

    if (state.search) {
      const s = state.search.toLowerCase();
      filtered = filtered.filter(f => f.name.toLowerCase().includes(s) || f.desc.toLowerCase().includes(s) || f.cat.toLowerCase().includes(s));
    }

    const fcEl = document.getElementById('field-count');
    if (fcEl) fcEl.textContent = filtered.length;

    // Clear safely
    while (tbody.firstChild) tbody.removeChild(tbody.firstChild);

    filtered.forEach(f => {
      const tr = document.createElement('tr');

      const td1 = document.createElement('td'); td1.className = 'fc'; td1.textContent = f.name;
      const td2 = document.createElement('td'); td2.style.color = 'var(--text-muted)'; td2.textContent = f.desc;
      const td3 = document.createElement('td'); td3.style.textAlign = 'center';
      const sp3 = document.createElement('span'); sp3.className = f.ares ? 'chk' : 'crs'; sp3.textContent = f.ares ? '\u25CF' : '\u2014';
      td3.appendChild(sp3);
      const td4 = document.createElement('td'); td4.style.textAlign = 'center';
      const sp4 = document.createElement('span');
      if (f.justice) { sp4.className = 'chk'; sp4.style.color = 'var(--justice)'; sp4.textContent = '\u25CF'; }
      else { sp4.className = 'crs'; sp4.textContent = '\u2014'; }
      td4.appendChild(sp4);
      const td5 = document.createElement('td');
      const badge = document.createElement('span');
      badge.className = 'badge ' + getSource(f);
      badge.textContent = f.cat;
      td5.appendChild(badge);

      tr.append(td1, td2, td3, td4, td5);
      tbody.appendChild(tr);
    });
  }

  // ============ BUILD ARCHITECTURE ============
  function buildArchitecture() {
    const panel = document.createElement('div');
    panel.className = 'panel';
    panel.id = 'panel-architecture';

    const title = document.createElement('div');
    title.className = 'st'; title.style.marginBottom = '24px';
    title.textContent = 'Data Pipeline Architecture';
    panel.appendChild(title);

    const container = document.createElement('div');
    container.className = 'arch-container';

    // ARES column
    const aresSteps = [
      { n: '1', t: 'Frontend Request', d: 'React Query hook triggers POST/GET via Next.js', tag: 'useAresSearch() \u00B7 useAresSubjectByIco()' },
      { n: '2', t: 'Django REST View', d: 'Validates input via DRF serializers, rate-limits 12 req/min', tag: 'AresSearchView \u00B7 AresSubjectDetailView' },
      { n: '3', t: 'Redis Cache Check', d: 'Search: 15min TTL \u00B7 Detail: 1hr TTL. Hash-based keys.', tag: 'AresService.get_subject() \u00B7 .search()' },
      { n: '4', t: 'External API Call', d: 'On cache miss \u2192 HTTP to ares.gov.cz with 15s timeout', tag: 'AresClient \u00B7 requests.Session()' },
      { n: '5', t: 'Parse CZ \u2192 EN', d: 'Transforms Czech field names to English via pure functions', tag: 'parser.py \u00B7 parse_economic_subject()' },
      { n: '6', t: 'Cache + Store + Return', d: 'Store in Redis cache + EconomicSubject model (raw_data JSONField)', tag: 'EconomicSubject.objects.update_or_create()' },
    ];

    const justiceSteps = [
      { n: '1', t: 'Bulk Download', d: 'Fetch .xml.gz archives from dataor.justice.cz via CKAN API', tag: 'JusticeDataDownloader \u00B7 requests' },
      { n: '2', t: 'XML Parsing', d: 'Decompress + parse XML into structured Python objects', tag: 'JusticeXMLParser \u00B7 lxml.etree' },
      { n: '3', t: 'Database Import', d: 'Bulk upsert into PostgreSQL models with FK relationships', tag: 'Company \u00B7 Person \u00B7 CompanyPerson \u00B7 Fact' },
      { n: '4', t: 'Management Command', d: 'Django management command orchestrates full pipeline', tag: 'python manage.py import_justice' },
      { n: '5', t: 'Django REST API', d: 'Views + serializers expose stored data via REST endpoints', tag: 'CompanyViewSet \u00B7 PersonViewSet' },
      { n: '6', t: 'Frontend Queries', d: 'React Query hooks fetch from local DB (fast, no external calls)', tag: 'useJusticeCompany() \u00B7 useJusticePerson()' },
    ];

    function buildCol(cls, titleText, titleCls, steps) {
      const col = document.createElement('div');
      col.className = 'acol ' + cls;
      const t = document.createElement('div'); t.className = 'atit ' + titleCls; t.textContent = titleText;
      col.appendChild(t);
      steps.forEach(s => {
        const step = document.createElement('div'); step.className = 'astp';
        const num = document.createElement('div'); num.className = 'asn'; num.textContent = s.n;
        const content = document.createElement('div'); content.className = 'asc';
        const st = document.createElement('div'); st.className = 'ast'; st.textContent = s.t;
        const sd = document.createElement('div'); sd.className = 'asd2'; sd.textContent = s.d;
        const stag = document.createElement('div'); stag.className = 'astag'; stag.textContent = s.tag;
        content.append(st, sd, stag);
        step.append(num, content);
        col.appendChild(step);
      });
      return col;
    }

    const aresCol = buildCol('aco', '\u26A1 ARES Pipeline', 'aat', aresSteps);
    const justiceCol = buildCol('jco', '\u{1F4E6} Justice Pipeline', 'jat', justiceSteps);

    const center = document.createElement('div');
    center.className = 'acen';
    const arr1 = document.createElement('div'); arr1.className = 'aarr'; arr1.textContent = '\u2190';
    const lab = document.createElement('div'); lab.className = 'alab'; lab.textContent = 'MERGE ON ICO';
    const arr2 = document.createElement('div'); arr2.className = 'aarr'; arr2.textContent = '\u2192';
    center.append(arr1, lab, arr2);

    container.append(aresCol, center, justiceCol);
    panel.appendChild(container);

    // Comparison table
    const compTitle = document.createElement('div');
    compTitle.className = 'st'; compTitle.style.marginTop = '40px';
    compTitle.textContent = 'Key Architecture Differences';
    panel.appendChild(compTitle);

    const table = document.createElement('table');
    table.className = 'ctbl';
    const thead = document.createElement('thead');
    const headRow = document.createElement('tr');
    ['Aspect', 'ARES', 'Justice'].forEach(h => {
      const th = document.createElement('th'); th.textContent = h; headRow.appendChild(th);
    });
    thead.appendChild(headRow);
    table.appendChild(thead);

    const archDiffs = [
      ['Data Freshness', 'Real-time (live API calls)', 'Periodic bulk import'],
      ['Fetch Pattern', 'On-demand per request', 'Full dataset download'],
      ['Storage', 'Redis cache (TTL) + JSONField', 'PostgreSQL (normalized tables)'],
      ['Latency', '~1-15s (API call or cache hit)', '~10-50ms (local DB query)'],
      ['Rate Limits', '12 req/60s (throttled)', 'None (local data)'],
      ['Availability', 'Depends on ares.gov.cz uptime', 'Always available (local)'],
      ['Data Format', 'JSON REST (Czech \u2192 English parsed)', 'XML \u2192 PostgreSQL models'],
      ['Schema', 'Flat (1 record per ICO)', 'Relational (Company \u2194 Person \u2194 Fact)'],
    ];

    const tbody = document.createElement('tbody');
    archDiffs.forEach(row => {
      const tr = document.createElement('tr');
      row.forEach((cell, i) => {
        const td = document.createElement('td');
        if (i === 0) td.style.fontWeight = '600';
        else if (i === 1) td.className = 'av';
        else td.className = 'jv';
        td.textContent = cell;
        tr.appendChild(td);
      });
      tbody.appendChild(tr);
    });
    table.appendChild(tbody);
    panel.appendChild(table);

    return panel;
  }

  // ============ BUILD CATEGORIES ============
  function buildCategories() {
    const panel = document.createElement('div');
    panel.className = 'panel';
    panel.id = 'panel-categories';

    const title = document.createElement('div');
    title.className = 'st'; title.style.marginBottom = '20px';
    title.textContent = 'Data Categories Breakdown';
    panel.appendChild(title);

    const grid = document.createElement('div');
    grid.className = 'categories-grid';
    grid.id = 'categories-grid';
    panel.appendChild(grid);

    return panel;
  }

  function renderCategories() {
    const grid = document.getElementById('categories-grid');
    while (grid.firstChild) grid.removeChild(grid.firstChild);

    categories.forEach(c => {
      const catFields = fields.filter(f => f.cat === c.id);
      if (catFields.length === 0) return;

      const aOnly = catFields.filter(f => f.ares && !f.justice).length;
      const jOnly = catFields.filter(f => f.justice && !f.ares).length;
      const bth = catFields.filter(f => f.ares && f.justice).length;
      const isOpen = state.openCats.has(c.id);

      const card = document.createElement('div');
      card.className = 'cc' + (isOpen ? ' open' : '');
      card.dataset.cat = c.id;

      // Header
      const header = document.createElement('div');
      header.className = 'ch';
      header.addEventListener('click', () => {
        if (state.openCats.has(c.id)) state.openCats.delete(c.id);
        else state.openCats.add(c.id);
        renderCategories();
      });

      const name = document.createElement('div');
      name.className = 'cn';
      const emoji = document.createElement('span');
      emoji.textContent = c.emoji;
      const nameText = document.createElement('span');
      const countSpan = document.createElement('span');
      countSpan.style.cssText = 'color:var(--text-dim);font-weight:400;font-size:12px;';
      countSpan.textContent = ' (' + catFields.length + ' fields)';
      nameText.textContent = c.label;
      nameText.appendChild(countSpan);
      name.append(emoji, nameText);

      const rightSide = document.createElement('div');
      rightSide.style.cssText = 'display:flex;align-items:center;gap:8px;';
      const badges = document.createElement('div');
      badges.style.cssText = 'display:flex;gap:6px;';

      if (aOnly + bth > 0) {
        const b = document.createElement('span'); b.className = 'badge ares';
        b.textContent = 'ARES ' + (aOnly + bth); badges.appendChild(b);
      }
      if (jOnly + bth > 0) {
        const b = document.createElement('span'); b.className = 'badge justice';
        b.textContent = 'Justice ' + (jOnly + bth); badges.appendChild(b);
      }
      if (bth > 0) {
        const b = document.createElement('span'); b.className = 'badge both';
        b.textContent = 'Both ' + bth; badges.appendChild(b);
      }

      const chev = document.createElement('span');
      chev.className = 'chevron';
      chev.textContent = '\u25B6';

      rightSide.append(badges, chev);
      header.append(name, rightSide);
      card.appendChild(header);

      // Body
      const body = document.createElement('div');
      body.className = 'cb';
      const inner = document.createElement('div');
      inner.className = 'cbi';

      const desc = document.createElement('div');
      desc.style.cssText = 'color:var(--text-dim);font-size:12px;margin-bottom:12px;';
      desc.textContent = c.desc;
      inner.appendChild(desc);

      catFields.forEach(f => {
        const row = document.createElement('div');
        row.className = 'fr';

        const src = document.createElement('div');
        src.className = 'fs';
        if (f.ares) { const d = document.createElement('span'); d.className = 'sd asd'; src.appendChild(d); }
        else { const sp = document.createElement('span'); sp.style.cssText = 'display:inline-block;width:8px;'; src.appendChild(sp); }
        if (f.justice) { const d = document.createElement('span'); d.className = 'sd jsd'; src.appendChild(d); }
        else { const sp = document.createElement('span'); sp.style.cssText = 'display:inline-block;width:8px;'; src.appendChild(sp); }

        const fname = document.createElement('div');
        fname.className = 'fn'; fname.textContent = f.name;
        const fdesc = document.createElement('div');
        fdesc.className = 'fd'; fdesc.textContent = f.desc;

        row.append(src, fname, fdesc);
        inner.appendChild(row);
      });

      body.appendChild(inner);
      card.appendChild(body);
      grid.appendChild(card);
    });
  }

  // ============ INIT ============
  buildNav();
  const mainEl = document.getElementById('main-content');
  mainEl.append(buildOverview(), buildFields(), buildArchitecture(), buildCategories());
  renderFieldsTable();
  renderCategories();
</script>
</body>
</html>
